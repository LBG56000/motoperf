services:
  backend:
    build: ./backend
    container_name: backend
    networks:
      - mongodb_express
    ports:
      - "${PORT_BACK}:${PORT_BACK}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./.env
    depends_on:
      - mongo
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    container_name: frontend
    ports:
      - "${PORT_FRONT}:${PORT_FRONT}"
    depends_on:
      - backend
    environment:
      - NUXT_HOST=0.0.0.0
    env_file:
      - ./.env
  mongo:
    image: mongo:8
    container_name: mongo
    restart: always
    networks:
      - mongodb_express
    ports:
      - "${PORT_DB}:${PORT_DB}"
    volumes:
      - mongo_data:/data/db/
      - mongo_log:/var/log/mongodb/
      - ./mongo-init.ts:/docker-entrypoint-initdb.d/mongo-init.ts
    env_file:
      - ./.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: mongo-express
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    networks:
      - mongodb_express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: ${PORT_DB}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}

volumes:
  mongo_data:
    driver: local
    name: mongo_data
  mongo_log:
    driver: local
    name: mongo_log

networks: 
  mongodb_express:
    driver: bridge
    name: mongodb_express
